name: Push to Docker Hub

on:
  push:
    # branches: [ "main" ]
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  call_time:
    uses: ./.github/workflows/shared_time_utility.yml  

  build_and_push_to_docker_image:
    needs: call_time
    name: Push Docker image to Docker Hub
    env:
        GLOBAL_TOME: ${{ needs.call_time.outputs.formatted_time }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v6

      - name: Use Shared Time
        run: |
          echo "The time passed from the utility is: $GLOBAL_TOME"

      - name: Log in to Docker Hub 
        uses: docker/login-action@v4
        with: 
          username: ${{secrets.DOCKER_USERNAME}}
          password: ${{secrets.DOCKER_PASSWORD}}
          
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{secrets.DOCKER_USERNAME}}/nginx_web_app_img

      - name: print ${{steps.meta.outputs.tags}}
        run: echo "Build Docker- ${{toJSON(steps.meta)}}"

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile.frontend
          push: true
        #   repository: ${{secrets.DOCKER_USERNAME}}/nginx_web_app_img
          tags: ${{steps.meta.outputs.tags}}
          labels: ${{steps.meta.outputs.labels}}
          build-args: |
            VITE_BACKEND_API_URL=${{ secrets.VITE_BACKEND_API_URL }}
            VITE_KC_ADMIN_CONSOLE_API_URL=${{ secrets.VITE_KC_ADMIN_CONSOLE_API_URL }}
            VITE_KC_ADMIN_CONSOLE_PORT=${{ secrets.VITE_KC_ADMIN_CONSOLE_PORT }}
            VITE_KC_ADMIN_CONSOLE_REAL_NAME=${{ secrets.VITE_KC_ADMIN_CONSOLE_REAL_NAME }}
            VITE_KC_ADMIN_CONSOLE_CLIENT_ID=${{ secrets.VITE_KC_ADMIN_CONSOLE_CLIENT_ID }}